services:
  - type: web
    name: creditos-crecer
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: "true"
